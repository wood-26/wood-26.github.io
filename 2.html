<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Senai: Projects</title>
    <script>src="../../js/validate.js"</script>
    <style>
    h1{text-align: center;
    }
    h2{text-align: center;
    }
    p{text-align: justify;
    }
    .grid{
        display: grid;
        height: 100vh;
        grid:
            'head head head' 1fr
            'side1 main side2' 1fr
            'card card card' 1fr
            'foot foot foot' 100px
            /1fr 1fr 1fr;
            grid-gap: 10px;
            font-size: 24px;
            color: Burlywood;
    }
    #head{
        grid-area: head;
        width: 100%;
        height: 100%;
        background-color: Burlywood;
        color: black;
    }
    #card{
        grid-area: card;
        width: 100%;
        height: 100%;
        background-color: Burlywood;
        color: black;
    }
    #side1{
        grid-area: side1;
        width: 100%;
        height: 100%;
        background-color: Burlywood;
        color: black;
    }
    #side2{
        grid-area: side2;
        width: 100%;
        height: 100%;
        background-color: Burlywood;
        color: black;
    }
    #main{
        grid-area: main;
        width: 100%;
        height: 100%;
        background-color: Burlywood;
        color: black;
    }
    #foot{
        grid-area: foot;
        width: 100%;
        height: 100%;
        background-color: Burlywood;
        color: black;
    }
    </style>
    </head>
    <body>
        <div id="head">
            <h1 style="text-align:left">Senai</h1>
            <h1 style="text-align:center">Projects</h1>
        </div>
        <div id="side1">
            <h2>Side1</h2>
        </div>
        <div id="main">
            <h2>Main</h2>
        </div>
        <div id="side2">
            <h2>Side2</h2>
        </div>
        <div id="card">
            <h2>Card</h2>
        </div>
        <div id="foot">
            <h2>Foot<h2>
        </div>
    
    </body>
</html>
